app = "tavadiena"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  SITE_URL = "https://tavadiena.lv"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
